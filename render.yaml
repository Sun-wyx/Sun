services:
  - type: web
    name: rent-decision-app
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: APP_USER_AGENT
        value: rent-decision-app/2.0 contact@example.com
